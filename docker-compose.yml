services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-demonit}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-demonit}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: "8080"
      APP_ENV: ${APP_ENV:-production}
      DATABASE_DSN: host=db user=${POSTGRES_USER:-postgres} password=${POSTGRES_PASSWORD:-postgres} dbname=${POSTGRES_DB:-demonit} port=5432 sslmode=disable TimeZone=UTC
      DEVICE_API_KEY: ${DEVICE_API_KEY:-dev-device-key-change-me}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-dev-admin-key-change-me}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      WORKER_INTERVAL: ${WORKER_INTERVAL:-30s}
      OFFLINE_TIMEOUT: ${OFFLINE_TIMEOUT:-30s}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://localhost:8080}
        NUXT_PUBLIC_POLL_INTERVAL_MS: ${NUXT_PUBLIC_POLL_INTERVAL_MS:-15000}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://localhost:8080}
      NUXT_PUBLIC_POLL_INTERVAL_MS: ${NUXT_PUBLIC_POLL_INTERVAL_MS:-15000}
      # Server-side BFF → backend on the Docker network
      NUXT_API_BASE_SERVER: http://backend:8080
      NUXT_ADMIN_API_KEY: ${ADMIN_API_KEY:-dev-admin-key-change-me}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  postgres_data:
